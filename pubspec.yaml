name: haya
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  supabase_flutter: ^2.8.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.5
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^3.1.11
  intl: ^0.19.0
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  hijri: ^3.0.0
  confetti: ^0.8.0
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.2.1
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0D3B2E"
  image: "assets/images/logo.png"
  image_padding_android: 150
  android_12:
    image: "assets/images/logo.png"
    icon_background_color: "#0D3B2E"
    image_padding_android: 150
  ios: true
  web: false
